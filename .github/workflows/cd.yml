name: Deployment

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed
    branches:
      - main

jobs:
  render_deploy:
    name: delpoy to render
    runs-on: ubuntu-latest

    if: ${{github.event.workflow_run.conclusion == 'success'}}

    # differ
    steps:
      - name: trigger webhook
        run: curl "$RENDER_HOOK"
        env:
          RENDER_HOOK: ${{secrets.RENDER_HOOK}}
