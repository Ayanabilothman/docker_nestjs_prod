name: CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    name: unit test
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: install nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install packages
        run: npm ci

      - name: run test
        run: npm run test

  build:
    name: build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout code
        uses: actions/checkout@v6

      - name: install nodejs
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: install packages
        run: npm ci

      - name: run build
        run: npm run build
